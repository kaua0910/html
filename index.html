<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Minha Calculadora</title>
</head>
<script src="js/calculo.js"></script>
<body>
    <h1>Minha Calculadora</h1>
    <center>
    <table border="1">
        <tr>
            <th>Primeiro Número(Base do triangulo) <br>
    <input type="number" id="n1"></th>
                <th>
                    Segundo Número(Altura do triangulo) <br>
    <input type="number" id="n2">
                </th>
        </tr>
        <tr>
            <td><button onclick="somar()">Somar</button></td>
            <td><button onclick="subtrair()">Subtrair</button></td>
        </tr>
        <tr>
            <td><button onclick="multiplicar()">Multiplicar</button></td>
            <td><button onclick="dividir()">Dividir</button></td>
        </tr>
        <tr>
             <td><button onclick="triangulo()">Triângulo</button></td>
        
        <td>
            <button onclick="quadrado()">Quadrado</button></td>
        </tr>
        <tr>
            <th colspan="2">
                Modificar o primeiro número
            </th>
        </tr>
        <tr>
            <td> <button onclick="dez()">-10%</button></td>
            <td><button onclick="quinze()">+15%</button></td>
        </tr>
        <tr>
            <td><button onclick="tres()">-3%</button></td>
            <td><button onclick="imposto()">Imposto de Renda</button></td>
        </tr>
        <tr>
            <th>O resultado é </th>
            <th><span id="resultado"></span></th>
        </tr>
    </table></center>

    <h1>Verificação de Idade</h1>
    Digite sua Idade<br>
    <input type="number" id="idade">
    <button onclick="verificar()">Verificar</button><br>
    Você é <span id="idade_resultado"></span>

    <h1>Par ou Ímpar</h1>
    Digite um número
    <input type="number" id="numero">
    <button onclick="par_impar()">Par ou Ímpar</button>
    <br>
    <span id="paridade"></span>

<script src="js/calculo.js"></script>
</body>
</html>
